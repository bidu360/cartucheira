<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Cartucheira</title>

<style>

body{
background:#000;
font-family:Arial;
margin:0;
color:white;
}

.topo{
text-align:center;
padding:15px;
font-size:22px;
letter-spacing:2px;
}

.menu{
display:flex;
justify-content:center;
background:#111;
}

.menu button{
padding:15px 35px;
border:none;
background:#111;
color:white;
font-size:16px;
cursor:pointer;
}

.menu button:hover{
background:#222;
}

.aba{
display:none;
}

.aba.ativa{
display:block;
}

.inicio{
text-align:center;
padding-top:80px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
padding:40px;
}

button.cartucho{
padding:35px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
position:relative;
overflow:hidden;
}

.efeitos{background:#ffb6c1;}
.trilhas{background:#9fd4ff;}
.vinil{background:#ff9800;}

.playing{
background:#00c853 !important;
color:white;
animation:piscar 0.8s infinite;
}

@keyframes piscar{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

.progress{
width:0%;
height:6px;
background:#fff;
position:absolute;
bottom:0;
left:0;
}

</style>

</head>

<body>

<div class="topo">CARTUCHEIRA • BY MOZA</div>

<div class="menu">

<button onclick="trocarAba('inicio')">INÍCIO</button>
<button onclick="trocarAba('efeitos')">EFEITOS</button>
<button onclick="trocarAba('trilhas')">TRILHAS</button>
<button onclick="trocarAba('vinil')">DISCO DE VINIL</button>

</div>

<script>

var audios = {}

window.onload = function(){

var lista = [

"gloriaaleluia1","gloriaaleluia2","cowboy","heee","a5",
"a6","a7","a8","a9","a10",
"gemido","palmas","assovio","buzina","metralhadora",
"audiobobo","beijo","risada1","risada2","risada3",

"trilhacomic","trilhapop1","trilhapop2","trilhapop3","trilhasexy",

"vinil1","vinil2","vinil3","vinil4","vinil5",
"vinil6","vinil7","vinil8","vinil9","vinil10",
"vinil11","vinil12","vinil13","vinil14","vinil15",
"vinil16","vinil17","vinil18","vinil19","vinil20"

]

lista.forEach(function(id){

audios[id] = new Audio("audios/" + id + ".mp3")

})

}

function trocarAba(nome){

document.querySelectorAll(".aba").forEach(function(el){
el.classList.remove("ativa")
})

document.getElementById(nome).classList.add("ativa")

}

function play(btn,id){

var audio = audios[id]
var progress = btn.querySelector(".progress")

if(!audio) return

if(!audio.paused){

var fade = setInterval(function(){

if(audio.volume>0.05){
audio.volume -=0.05
}else{
clearInterval(fade)
audio.pause()
audio.currentTime=0
audio.volume=1
btn.classList.remove("playing")
progress.style.width="0%"
}

},50)

return

}

audio.currentTime=0
audio.volume=1

btn.classList.add("playing")

audio.play()

var interval = setInterval(function(){

if(audio.duration){

var percent = (audio.currentTime/audio.duration)*100

progress.style.width = percent + "%"

}

},100)

audio.onended = function(){

clearInterval(interval)
progress.style.width="0%"
btn.classList.remove("playing")

}

}

</script>
