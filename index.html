<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Cartucheira</title>

<style>

body{
background:#0a0a0a;
font-family:Arial;
margin:0;
color:white;
}

/* barra superior */

.topo{
text-align:center;
padding:15px;
font-size:20px;
font-weight:bold;
letter-spacing:2px;
}

/* abas */

.tabs{
display:flex;
background:#111;
}

.tab{
flex:1;
padding:15px;
text-align:center;
cursor:pointer;
background:#1a1a1a;
}

.tab.active{
background:#ff9800;
color:black;
font-weight:bold;
}

/* telas */

.tela{
display:none;
}

.tela.active{
display:block;
}

/* grid botões */

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
padding:30px;
}

button{
padding:35px;
font-size:18px;
border-radius:10px;
border:none;
cursor:pointer;
position:relative;
overflow:hidden;
}

.laranja{background:#ff9800;}
.cinza{background:#555;color:white;}
.azul{background:#6fb1ce;}
.amarelo{background:#ffd400;}

.playing{
background:#00c853 !important;
color:white;
animation:piscar 0.8s infinite;
}

@keyframes piscar{

0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}

}

.progress{
width:0%;
height:6px;
background:#ffffff;
position:absolute;
bottom:0;
left:0;
border-radius:0 0 10px 10px;
}

/* tela inicio */

.inicio{
text-align:center;
padding:80px;
font-size:22px;
}

</style>

</head>

<body>

<div class="topo">
CARTUCHEIRA • BY MOZA
</div>

<div class="tabs">

<div class="tab active" onclick="trocarTela('inicio',this)">INÍCIO</div>
<div class="tab" onclick="trocarTela('efeitos',this)">EFEITOS</div>
<div class="tab" onclick="trocarTela('trilhas',this)">TRILHAS</div>
<div class="tab" onclick="trocarTela('vinil',this)">DISCO DE VINIL</div>

</div>

<!-- INICIO -->

<div id="inicio" class="tela active">

<div class="inicio">

<h1>CARTUCHEIRA</h1>

<p>Desenvolvido por MOZA</p>

</div>

</div>

<!-- EFEITOS -->

<div id="efeitos" class="tela">

<div class="grid">

<button class="cinza" onclick="play(this,'risada1')">RISADA 1<div class="progress"></div></button>
<button class="cinza" onclick="play(this,'risada2')">RISADA 2<div class="progress"></div></button>
<button class="cinza" onclick="play(this,'palmas')">PALMAS<div class="progress"></div></button>
<button class="cinza" onclick="play(this,'assovio')">ASSOVIO<div class="progress"></div></button>
<button class="cinza" onclick="play(this,'buzina')">BUZINA<div class="progress"></div></button>

</div>

</div>

<!-- TRILHAS -->

<div id="trilhas" class="tela">

<div class="grid">

<button class="azul" onclick="play(this,'trilhacomic')">TRILHA COMIC<div class="progress"></div></button>
<button class="azul" onclick="play(this,'trilhapop1')">TRILHA POP 1<div class="progress"></div></button>
<button class="azul" onclick="play(this,'trilhapop2')">TRILHA POP 2<div class="progress"></div></button>
<button class="azul" onclick="play(this,'trilhapop3')">TRILHA POP 3<div class="progress"></div></button>
<button class="azul" onclick="play(this,'trilhasexy')">TRILHA SEXY<div class="progress"></div></button>

</div>

</div>

<!-- VINIL -->

<div id="vinil" class="tela">

<div class="grid">

<button class="laranja" onclick="play(this,'gloriaaleluia1')">GLORIA ALELUIA<div class="progress"></div></button>
<button class="laranja" onclick="play(this,'gloriaaleluia2')">GLORIA ALELUIA 2<div class="progress"></div></button>
<button class="laranja" onclick="play(this,'cowboy')">COWBOY<div class="progress"></div></button>
<button class="laranja" onclick="play(this,'heee')">HEEE<div class="progress"></div></button>
<button class="laranja" onclick="play(this,'a5')">SOM 5<div class="progress"></div></button>

</div>

</div>

<script>

/* troca de abas */

function trocarTela(id,el){

document.querySelectorAll(".tela").forEach(t=>{
t.classList.remove("active")
})

document.getElementById(id).classList.add("active")

document.querySelectorAll(".tab").forEach(t=>{
t.classList.remove("active")
})

el.classList.add("active")

}

/* motor audio (seu código original) */

var audios = {}

window.onload = function(){

var lista = [

"gloriaaleluia1","gloriaaleluia2","cowboy","heee",
"trilhacomic","trilhapop1","trilhapop2","trilhapop3","trilhasexy",
"palmas","assovio","buzina",
"risada1","risada2"

]

lista.forEach(function(id){

audios[id] = new Audio(id + ".mp3")

})

}

function play(btn,id){

var audio = audios[id]
var progress = btn.querySelector(".progress")

if(!audio){
console.log("Áudio não encontrado:",id)
return
}

if(!audio.paused){

var fade = setInterval(function(){

if(audio.volume > 0.05){
audio.volume -= 0.05
}else{
clearInterval(fade)
audio.pause()
audio.currentTime = 0
audio.volume = 1
btn.classList.remove("playing")
progress.style.width="0%"
}

},50)

return
}

audio.currentTime = 0
audio.volume = 1

btn.classList.add("playing")

audio.play()

var interval = setInterval(function(){

if(audio.duration){
var percent = (audio.currentTime / audio.duration) * 100
progress.style.width = percent + "%"
}

},100)

audio.onended = function(){

clearInterval(interval)
progress.style.width="0%"
btn.classList.remove("playing")

}

}

</script>

</body>
</html>
