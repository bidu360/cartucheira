<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cartucheira</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

button{
width:200px;
height:80px;
margin:10px;
font-size:18px;
cursor:pointer;
}
</style>

</head>

<body>

<h2>Cartucheira</h2>

<button onclick="play('a1')">Som 1</button>
<button onclick="play('a2')">Som 2</button>
<button onclick="play('a3')">Som 3</button>
<button onclick="play('a4')">Som 4</button>
<button onclick="play('a5')">Som 5</button>
<button onclick="play('a6')">Som 6</button>
<button onclick="play('a7')">Som 7</button>
<button onclick="play('a8')">Som 8</button>
<button onclick="play('a9')">Som 9</button>
<button onclick="play('a10')">Som 10</button>

<audio id="a1" src="audio1.mp3"></audio>
<audio id="a2" src="audio2.mp3"></audio>
<audio id="a3" src="audio3.mp3"></audio>
<audio id="a4" src="audio4.mp3"></audio>
<audio id="a5" src="audio5.mp3"></audio>
<audio id="a6" src="audio6.mp3"></audio>
<audio id="a7" src="audio7.mp3"></audio>
<audio id="a8" src="audio8.mp3"></audio>
<audio id="a9" src="audio9.mp3"></audio>
<audio id="a10" src="audio10.mp3"></audio>

<script>
function play(id){
var audio = document.getElementById(id);
audio.currentTime = 0;
audio.play();
}
</script>

</body>
</html>
