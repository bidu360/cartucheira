<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Cartucheira Moza</title>

<style>

body{
background:#111;
font-family:Arial;
text-align:center;
color:white;
}

.container{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
width:80%;
margin:auto;
margin-top:40px;
}

button{
height:80px;
font-size:18px;
border:none;
border-radius:6px;
background:#444;
color:white;
cursor:pointer;
}

.playing{
background:#00c853 !important;
}

/* CORES */

.laranja{
background:#ff9800;
color:black;
}

.azul{
background:#81d4fa;
color:black;
}

.amarelo{
background:#ffd600;
color:black;
}

</style>

</head>

<body>

<h1>Cartucheira Moza</h1>

<div class="container">

<button class="laranja" onclick="play(this,'a1')">Som 1</button>
<button class="laranja" onclick="play(this,'a2')">Som 2</button>
<button class="laranja" onclick="play(this,'a3')">Som 3</button>
<button class="laranja" onclick="play(this,'a4')">Som 4</button>
<button class="laranja" onclick="play(this,'a5')">Som 5</button>

<button onclick="play(this,'a6')">Som 6</button>
<button onclick="play(this,'a7')">Som 7</button>
<button onclick="play(this,'a8')">Som 8</button>
<button onclick="play(this,'a9')">Som 9</button>
<button onclick="play(this,'a10')">Som 10</button>

<button class="azul" onclick="play(this,'a11')">Som 11</button>
<button class="azul" onclick="play(this,'a12')">Som 12</button>
<button class="azul" onclick="play(this,'a13')">Som 13</button>
<button class="azul" onclick="play(this,'a14')">Som 14</button>
<button class="azul" onclick="play(this,'a15')">Som 15</button>

<button onclick="play(this,'a16')">Som 16</button>
<button onclick="play(this,'a17')">Som 17</button>
<button onclick="play(this,'a18')">Som 18</button>
<button onclick="play(this,'a19')">Som 19</button>
<button onclick="play(this,'a20')">Som 20</button>

<button class="amarelo" onclick="play(this,'a21')">Som 21</button>
<button class="amarelo" onclick="play(this,'a22')">Som 22</button>
<button class="amarelo" onclick="play(this,'a23')">Som 23</button>
<button class="amarelo" onclick="play(this,'a24')">Som 24</button>
<button class="amarelo" onclick="play(this,'a25')">Som 25</button>

<button onclick="play(this,'risada1')">RISADA1</button>
<button onclick="play(this,'a27')">Som 27</button>
<button onclick="play(this,'a28')">Som 28</button>
<button onclick="play(this,'a29')">Som 29</button>
<button onclick="play(this,'a30')">Som 30</button>

</div>

<script>

function play(btn,id){

var audio = new Audio(id + ".mp3")

btn.classList.add("playing")

audio.play()

audio.onended = function(){

btn.classList.remove("playing")

}

}

</script>

</body>
</html>
