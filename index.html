<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Cartucheira</title>

<style>

body{
background:#0a0a0a;
font-family:Arial;
margin:0;
color:white;
}

/* TOPO */

.topo{
text-align:center;
color:white;
font-weight:bold;
letter-spacing:2px;
padding:15px;
font-size:20px;
}

/* ABAS */

.tabs{
display:flex;
}

.tab{
flex:1;
padding:15px;
text-align:center;
cursor:pointer;
background:#111;
color:white;
font-weight:bold;
border:none;
outline:none;
}

.tab.active{
color:white;
}

/* cores das abas */

.tab.efeitos.active{background:#ff4fa3;}
.tab.trilhas.active{background:#6fb1ce;color:black;}
.tab.vinil.active{background:#ff9800;color:black;}

/* telas */

.tela{display:none;}
.tela.active{display:block;}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
padding:30px;
}

/* BOTÕES */

button{
padding:35px;
font-size:16px;
border-radius:10px;
border:none;
cursor:pointer;
position:relative;
overflow:hidden;
}

/* CORES */

.rosa{background:#ff4fa3;color:white;}
.azulclaro{background:#6fb1ce;color:black;}
.laranja{background:#ff9800;}
.cinza{background:#555;color:white;}

.playing{
background:#00c853 !important;
color:white;
animation:piscar 0.8s infinite;
}

@keyframes piscar{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

/* barra progresso */

.progress{
width:0%;
height:6px;
background:#ffffff;
position:absolute;
bottom:0;
left:0;
border-radius:0 0 10px 10px;
}

/* INICIO */

.inicio{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:70vh;
text-align:center;
}

.logo{
max-width:600px;
width:90%;
margin-bottom:20px;
}

.creditos{
font-size:15px;
opacity:0.85;
letter-spacing:0.5px;
max-width:600px;
line-height:1.5;
}

</style>

</head>

<script>

function trocarTela(id,el){

document.querySelectorAll(".tela").forEach(t=>{
t.classList.remove("active")
})

document.getElementById(id).classList.add("active")

document.querySelectorAll(".tab").forEach(t=>{
t.classList.remove("active")
})

el.classList.add("active")

}

var audios = {}

window.onload = function(){

var lista = [

"gloriaaleluia1","gloriaaleluia2","cowboy","heee",
"a5","a6","a7","a8","a9","a10",
"gemido","palmas","assovio","buzina","metralhadora",
"audiobobo","beijo","risada1","risada2","risada3",

"trilhacomic","trilhapop1","trilhapop2","trilhapop3","trilhasexy"

]

lista.forEach(function(id){

audios[id] = new Audio(id + ".mp3")

})

}

function play(btn,id){

var audio = audios[id]
var progress = btn.querySelector(".progress")

if(!audio){
console.log("Áudio não encontrado:",id)
return
}

if(!audio.paused){

var fade = setInterval(function(){

if(audio.volume > 0.05){
audio.volume -= 0.05
}else{
clearInterval(fade)
audio.pause()
audio.currentTime = 0
audio.volume = 1
btn.classList.remove("playing")
progress.style.width="0%"
}

},50)

return
}

audio.currentTime = 0
audio.volume = 1

btn.classList.add("playing")

audio.play()

var interval = setInterval(function(){

if(audio.duration){
var percent = (audio.currentTime / audio.duration) * 100
progress.style.width = percent + "%"
}

},100)

audio.onended = function(){

clearInterval(interval)
progress.style.width="0%"
btn.classList.remove("playing")

}

}

</script>
