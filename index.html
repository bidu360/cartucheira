<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cartucheira</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.container{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
width:80%;
margin:auto;
}

button{
width:100%;
height:80px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:6px;
background:#ff3b3b;
color:white;
font-weight:bold;
transition:0.2s;
}

button:hover{
background:#ff0000;
}

.playing{
background:#00cc44 !important;
}

</style>

</head>

<body>

<h2>Cartucheira</h2>

<div class="container">

<button onclick="play(this,'a1')">Som 1</button>
<button onclick="play(this,'a2')">Som 2</button>

<button onclick="play(this,'a4')">Som 4</button>
<button onclick="play(this,'a5')">Som 5</button>

<button onclick="play(this,'a6')">Som 6</button>

<button onclick="play(this,'a8')">Som 8</button>
<button onclick="play(this,'a9')">Som 9</button>
<button onclick="play(this,'a10')">Som 10</button>

<button onclick="play(this,'a11')">Som 11</button>
<button onclick="play(this,'a12')">Som 12</button>
<button onclick="play(this,'a13')">Som 13</button>

<button onclick="play(this,'a15')">Som 15</button>

<button onclick="play(this,'a16')">Som 16</button>
<button onclick="play(this,'a17')">Som 17</button>
<button onclick="play(this,'a18')">Som 18</button>
<button onclick="play(this,'a19')">Som 19</button>
<button onclick="play(this,'a20')">Som 20</button>

<button onclick="play(this,'a21')">Som 21</button>
<button onclick="play(this,'a22')">Som 22</button>
<button onclick="play(this,'a23')">Som 23</button>

<button onclick="tocarSom('RISADA CRIANÇA 2.mp3', this)">RISADA1</button>
<button onclick="play(this,'a27')">Som 27</button>
<button onclick="play(this,'a28')">Som 28</button>

<button onclick="play(this,'a30')">Som 30</button>

</div>

<script>

function play(btn,id){

var audio = new Audio("audios/"+id+".mp3");

btn.classList.add("playing");

audio.play();

audio.onended = function(){

btn.classList.remove("playing");

}

}

</script>

</body>
</html>
