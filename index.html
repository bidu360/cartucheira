
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Cartucheira</title>

<style>

body{
background:#0a0a0a;
font-family:Arial;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
padding:30px;
}

button{
padding:35px;
font-size:18px;
border-radius:10px;
border:none;
cursor:pointer;
}

.laranja{background:#ff9800;}
.cinza{background:#555;color:white;}
.azul{background:#6fb1ce;}
.amarelo{background:#ffd400;}

.playing{
background:#00c853 !important;
color:white;
}

</style>

</head>

<body>

<div class="grid">

<!-- LINHA 1 -->
<button class="laranja" onclick="play(this,'a1')">Som 1</button>
<button class="laranja" onclick="play(this,'a2')">Som 2</button>
<button class="laranja" onclick="play(this,'a3')">Som 3</button>
<button class="laranja" onclick="play(this,'a4')">Som 4</button>
<button class="laranja" onclick="play(this,'a5')">Som 5</button>

<!-- LINHA 2 -->
<button class="cinza" onclick="play(this,'a6')">Som 6</button>
<button class="cinza" onclick="play(this,'a7')">Som 7</button>
<button class="cinza" onclick="play(this,'a8')">Som 8</button>
<button class="cinza" onclick="play(this,'a9')">Som 9</button>
<button class="cinza" onclick="play(this,'a10')">Som 10</button>

<!-- LINHA 3 -->
<button class="azul" onclick="play(this,'a11')">Som 11</button>
<button class="azul" onclick="play(this,'a12')">Som 12</button>
<button class="azul" onclick="play(this,'a13')">Som 13</button>
<button class="azul" onclick="play(this,'a14')">Som 14</button>
<button class="azul" onclick="play(this,'a15')">Som 15</button>

<!-- LINHA 4 -->
<button class="cinza" onclick="play(this,'gemido')">GEMIDO</button>
<button class="cinza" onclick="play(this,'a17')">Som 17</button>
<button class="cinza" onclick="play(this,'a18')">Som 18</button>
<button class="cinza" onclick="play(this,'a19')">Som 19</button>
<button class="cinza" onclick="play(this,'a20')">Som 20</button>

<!-- LINHA 5 -->
<button class="amarelo" onclick="play(this,'audiobobo')">AUDIOBOBO</button>
<button class="amarelo" onclick="play(this,'beijo')">BEIJO</button>
<button class="amarelo" onclick="play(this,'risada1')">RISADA1</button>
<button class="amarelo" onclick="play(this,'risada2')">RISADA2</button>
<button class="amarelo" onclick="play(this,'risada3')">RISADA3</button>

</div>

<script>

var audios = {}

window.onload = function(){

var lista = [

"a1","a2","a3","a4","a5",
"a6","a7","a8","a9","a10",
"a11","a12","a13","a14","a15",
"gemido","a17","a18","a19","a20",
"audiobobo","beijo",
"risada1","risada2","risada3"

]

lista.forEach(function(id){

audios[id] = new Audio(id + ".mp3")

})

}

function play(btn,id){

var audio = audios[id]

if(!audio){
console.log("Áudio não encontrado:",id)
return
}

audio.currentTime = 0

btn.classList.add("playing")

audio.play()

audio.onended = function(){
btn.classList.remove("playing")
}

}

</script>

</body>
</html>
