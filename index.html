<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Cartucheira</title>

<style>

body{
background:#000;
font-family:Arial;
margin:0;
color:white;
}

/* TITULO */

.assinatura{
text-align:center;
letter-spacing:2px;
padding:15px;
font-size:20px;
font-weight:bold;
}

/* VU METER ESTILO MESA */

.vu-wrapper{
width:420px;
margin:0 auto 10px auto;
}

.vu-row{
display:flex;
align-items:center;
margin:3px 0;
}

.vu-label{
width:20px;
color:#00ff66;
font-weight:bold;
}

.vu-meter{
display:flex;
gap:4px;
flex-grow:1;
}

.vu-led{
width:18px;
height:12px;
background:#111;
border-radius:2px;
}

.vu-led.green{background:#00ff00;}
.vu-led.yellow{background:#ffff00;}
.vu-led.red{background:#ff0000;}

.vu-scale{
display:flex;
justify-content:space-between;
font-size:10px;
color:#00ff66;
margin:2px 20px;
}

/* ABAS */

.tabs{
display:flex;
justify-content:space-around;
background:#111;
padding:15px 0;
font-weight:bold;
}

.tab{
cursor:pointer;
}

.tab.active{
color:#00c853;
}

/* PAGINAS */

.page{
display:none;
}

.page.active{
display:block;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
padding:30px;
}

/* BOTÕES */

button{
padding:35px;
font-size:18px;
border-radius:10px;
border:none;
cursor:pointer;
position:relative;
overflow:hidden;
}

.rosa{background:#ff8ac7;}
.azul{background:#6fb1ce;}
.laranja{background:#ff9800;}

.playing{
background:#00c853 !important;
color:white;
animation:piscar 0.8s infinite;
}

@keyframes piscar{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

/* PROGRESSO */

.progress{
width:0%;
height:6px;
background:white;
position:absolute;
bottom:0;
left:0;
}

/* HOME */

.home{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding-top:60px;
}

.logo{
width:420px;
max-width:80%;
margin-bottom:40px;
}

.footer{
color:#aaa;
font-size:14px;
margin-top:40px;
line-height:24px;
}

</style>

</head>

<body>

<div class="assinatura">CARTUCHEIRA • BY MOZA</div>

<div class="vu-wrapper">

<div class="vu-row">

<div class="vu-label">L</div>
<div class="vu-meter" id="vuL"></div>

</div>

<div class="vu-scale">
<span>-20</span>

<span>-10</span>

<span>-3</span>

<span>+4</span>
</div>

<div class="vu-row">

<div class="vu-label">R</div>
<div class="vu-meter" id="vuR"></div>

</div>

</div>

<div class="tabs">

<div class="tab active" onclick="openTab('principal',this)">INÍCIO</div>
<div class="tab" onclick="openTab('efeitos',this)">EFEITOS</div>
<div class="tab" onclick="openTab('trilhas',this)">TRILHAS</div>
<div class="tab" onclick="openTab('vinil',this)">DISCO DE VINIL</div>

</div>

<script>

var audios = {}
var vuInterval = null

function criarVU(){

const vuL = document.getElementById("vuL")
const vuR = document.getElementById("vuR")

for(let i=0;i<20;i++){

let ledL=document.createElement("div")
let ledR=document.createElement("div")

ledL.classList.add("vu-led")
ledR.classList.add("vu-led")

vuL.appendChild(ledL)
vuR.appendChild(ledR)

}

}

criarVU()

window.onload=function(){

var lista=[

"gloriaaleluia1","gloriaaleluia2","cowboy","heee","a5",
"a6","a7","a8","a9","a10",
"trilhacomic","trilhapop1","trilhapop2","trilhapop3","trilhasexy",
"gemido","palmas","assovio","buzina","metralhadora",
"audiobobo","beijo","risada1","risada2","risada3"

]

lista.forEach(function(id){

audios[id]=new Audio(id+".mp3")

})

}

function atualizarVU(){

let ledsL=document.querySelectorAll("#vuL .vu-led")
let ledsR=document.querySelectorAll("#vuR .vu-led")

let level=Math.floor(Math.random()*20)

ledsL.forEach((led,i)=>{

led.className="vu-led"

if(i<level){

if(i<12)led.classList.add("green")
else if(i<16)led.classList.add("yellow")
else led.classList.add("red")

}

})

ledsR.forEach((led,i)=>{

led.className="vu-led"

if(i<level){

if(i<12)led.classList.add("green")
else if(i<16)led.classList.add("yellow")
else led.classList.add("red")

}

})

}

function play(btn,id){

var audio=audios[id]
var progress=btn.querySelector(".progress")

if(!audio)return

if(!audio.paused){

clearInterval(vuInterval)

var fade=setInterval(function(){

if(audio.volume>0.05){
audio.volume-=0.05
}else{
clearInterval(fade)
audio.pause()
audio.currentTime=0
audio.volume=1
btn.classList.remove("playing")
progress.style.width="0%"
}

},50)

return
}

audio.currentTime=0
audio.volume=1

btn.classList.add("playing")

audio.play()

clearInterval(vuInterval)
vuInterval=setInterval(atualizarVU,80)

var interval=setInterval(function(){

if(audio.duration){

var percent=(audio.currentTime/audio.duration)*100
progress.style.width=percent+"%"

}

},100)

audio.onended=function(){

clearInterval(interval)
clearInterval(vuInterval)

progress.style.width="0%"
btn.classList.remove("playing")

}

}

function openTab(id,element){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")
element.classList.add("active")

}

</script>
