<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cartucheira</title>

<style>

body{
background:#111;
font-family:Arial;
color:white;
text-align:center;
}

h1{
margin-top:10px;
}

.abas{
margin:20px;
}

.abas button{
padding:10px 20px;
margin:5px;
background:#333;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

.abas button:hover{
background:#555;
}

.aba{
display:none;
}

.aba.ativa{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:20px;
}

.cartucho{
padding:20px;
background:#222;
border:none;
color:white;
font-size:15px;
cursor:pointer;
}

.cartucho:hover{
background:#444;
}

#vu{
width:300px;
height:20px;
background:#333;
margin:20px auto;
position:relative;
}

#vu-bar{
height:100%;
width:0%;
background:lime;
}

#progress{
width:300px;
margin:auto;
}

</style>
</head>

<body>

<h1>CARTUCHEIRA</h1>

<div id="vu">
<div id="vu-bar"></div>
</div>

<progress id="progress" value="0" max="100"></progress>

<div class="abas">

<button onclick="trocarAba('efeitos')">EFEITOS</button>

<button onclick="trocarAba('trilhas')">TRILHAS</button>

<button onclick="trocarAba('vinil')">DISCO DE VINIL</button>

</div>

<!-- ABA EFEITOS -->

<div id="efeitos" class="aba ativa">

<div class="grid">

<button class="cartucho" onclick="tocar('audios/risada.mp3')">RISADA</button>

<button class="cartucho" onclick="tocar('audios/aplausos.mp3')">APLAUSOS</button>

<button class="cartucho" onclick="tocar('audios/erro.mp3')">ERRO</button>

<button class="cartucho" onclick="tocar('audios/suspense.mp3')">SUSPENSE</button>

</div>

</div>

<!-- ABA TRILHAS -->

<div id="trilhas" class="aba">

<div class="grid">

<button class="cartucho" onclick="tocar('audios/trilha1.mp3')">TRILHA 1</button>

<button class="cartucho" onclick="tocar('audios/trilha2.mp3')">TRILHA 2</button>

<button class="cartucho" onclick="tocar('audios/trilha3.mp3')">TRILHA 3</button>

<button class="cartucho" onclick="tocar('audios/trilha4.mp3')">TRILHA 4</button>

</div>

</div>

<!-- ABA VINIL -->

<div id="vinil" class="aba">

<div class="grid">

<button class="cartucho" onclick="tocar('audios/vinil1.mp3')">VINIL 1</button>

<button class="cartucho" onclick="tocar('audios/vinil2.mp3')">VINIL 2</button>

<button class="cartucho" onclick="tocar('audios/vinil3.mp3')">VINIL 3</button>

<button class="cartucho" onclick="tocar('audios/vinil4.mp3')">VINIL 4</button>

</div>

</div>

<script>

let audio = new Audio()

let ctx = new (window.AudioContext || window.webkitAudioContext)()

let analyser = ctx.createAnalyser()
analyser.fftSize = 256

let source = ctx.createMediaElementSource(audio)

source.connect(analyser)
analyser.connect(ctx.destination)

function tocar(src){

audio.pause()

audio.src = src

audio.currentTime = 0

audio.play()

}

function trocarAba(nome){

document.querySelectorAll('.aba').forEach(a=>a.classList.remove('ativa'))

document.getElementById(nome).classList.add('ativa')

}

let data = new Uint8Array(analyser.frequencyBinCount)

function monitorVU(){

analyser.getByteFrequencyData(data)

let soma = data.reduce((a,b)=>a+b)

let media = soma/data.length

let porcentagem = media/255*100

document.getElementById("vu-bar").style.width = porcentagem+"%"

requestAnimationFrame(monitorVU)

}

monitorVU()

audio.ontimeupdate = function(){

let porcent = (audio.currentTime/audio.duration)*100

document.getElementById("progress").value = porcent

}

function fadeOut(){

let fade = setInterval(()=>{

if(audio.volume>0.05){

audio.volume -=0.05

}else{

audio.pause()

clearInterval(fade)

}

},100)

}

</script>

</body>
</html>
