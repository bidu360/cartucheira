<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Cartucheira</title>

<style>

body{
background:#0a0a0a;
font-family:Arial;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:40px;
}

button{
padding:40px;
font-size:22px;
border-radius:10px;
border:none;
cursor:pointer;
}

.amarelo{
background:#ffd400;
}

.azul{
background:#6fb1ce;
}

.laranja{
background:#ff9800;
}

.cinza{
background:#555;
color:white;
}

.playing{
background:#00c853 !important;
color:white;
}

</style>

</head>

<body>

<div class="grid">

<button class="laranja" onclick="play(this,'a1')">Som 1</button>
<button class="laranja" onclick="play(this,'a2')">Som 2</button>
<button class="laranja" onclick="play(this,'a3')">Som 3</button>

<button class="cinza" onclick="play(this,'a6')">Som 6</button>
<button class="cinza" onclick="play(this,'a7')">Som 7</button>
<button class="cinza" onclick="play(this,'a8')">Som 8</button>

<button class="azul" onclick="play(this,'a11')">Som 11</button>
<button class="azul" onclick="play(this,'a12')">Som 12</button>
<button class="azul" onclick="play(this,'a13')">Som 13</button>

<button class="cinza" onclick="play(this,'a16')">Som 16</button>
<button class="cinza" onclick="play(this,'a17')">Som 17</button>
<button class="cinza" onclick="play(this,'a18')">Som 18</button>

<button class="amarelo" onclick="play(this,'audiobobo')">AUDIOBOBO</button>
<button class="amarelo" onclick="play(this,'a22')">Som 22</button>
<button class="amarelo" onclick="play(this,'a23')">Som 23</button>

<button class="cinza" onclick="play(this,'risada1')">RISADA1</button>
<button class="cinza" onclick="play(this,'risada2')">RISADA2</button>
<button class="cinza" onclick="play(this,'risada3')">RISADA3</button>

</div>

<script>

var audios = {}

window.onload = function(){

var lista = [

"a1","a2","a3",
"a6","a7","a8",
"a11","a12","a13",
"a16","a17","a18",
"audiobobo","a22","a23",
"risada1","risada2","risada3"

]

lista.forEach(function(id){

audios[id] = new Audio(id + ".mp3")

})

}

function play(btn,id){

var audio = audios[id]

if(!audio){
console.log("audio não encontrado",id)
return
}

audio.currentTime = 0

btn.classList.add("playing")

audio.play()

audio.onended = function(){

btn.classList.remove("playing")

}

}

</script>

</body>
</html>
