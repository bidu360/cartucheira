<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Cartucheira</title>

<style>

body{
background:#000;
font-family:Arial;
margin:0;
color:white;
}

.topo{
text-align:center;
padding:15px;
font-size:22px;
letter-spacing:2px;
}

.menu{
display:flex;
justify-content:center;
background:#111;
}

.menu button{
padding:15px 35px;
border:none;
background:#111;
color:white;
font-size:16px;
cursor:pointer;
}

.menu button:hover{
background:#222;
}

.aba{
display:none;
}

.aba.ativa{
display:block;
}

.inicio{
text-align:center;
padding-top:80px;
}

.inicio img{
width:350px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
padding:40px;
}

button.cartucho{
padding:35px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
position:relative;
overflow:hidden;
}

.efeitos{
background:#ffb6c1;
}

.trilhas{
background:#9fd4ff;
}

.vinil{
background:#ff9800;
}

.playing{
background:#00c853 !important;
color:white;
animation:piscar 0.8s infinite;
}

@keyframes piscar{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

.progress{
width:0%;
height:6px;
background:#fff;
position:absolute;
bottom:0;
left:0;
}

</style>

</head>

<script>

var audios = {}

window.onload = function(){

var lista = []

for(let i=1;i<=20;i++){

lista.push("efeito"+i)
lista.push("trilha"+i)
lista.push("vinil"+i)

}

lista.forEach(function(id){

audios[id] = new Audio("audios/"+id+".mp3")

})

}

function trocarAba(nome){

document.querySelectorAll(".aba").forEach(function(el){
el.classList.remove("ativa")
})

document.getElementById(nome).classList.add("ativa")

}

function play(btn,id){

var audio = audios[id]
var progress = btn.querySelector(".progress")

if(!audio) return

if(!audio.paused){

var fade = setInterval(function(){

if(audio.volume>0.05){
audio.volume -=0.05
}else{
clearInterval(fade)
audio.pause()
audio.currentTime=0
audio.volume=1
btn.classList.remove("playing")
progress.style.width="0%"
}

},50)

return

}

audio.currentTime=0
audio.volume=1

btn.classList.add("playing")

audio.play()

var interval = setInterval(function(){

if(audio.duration){

var percent = (audio.currentTime/audio.duration)*100

progress.style.width = percent + "%"

}

},100)

audio.onended = function(){

clearInterval(interval)
progress.style.width="0%"
btn.classList.remove("playing")

}

}

</script>
