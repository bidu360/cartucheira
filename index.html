<!DOCTYPE html>

<meta charset="UTF-8">
<title>Cartucheira</title>

<style>

body{
background:#0a0a0a;
font-family:Arial;
margin:0;
}

.assinatura{
text-align:center;
color:white;
font-weight:bold;
letter-spacing:2px;
padding:15px;
font-size:20px;
}

/* ABAS */

.tabs{
display:flex;
justify-content:center;
background:#111;
padding:10px;
gap:10px;
}

.tab{
padding:12px 25px;
background:#333;
color:white;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.tab.active{
background:#00c853;
}

/* GRID BOTÕES */

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
padding:30px;
}

.page{
display:none;
}

.page.active{
display:block;
}

/* BOTÕES */

button{
padding:35px;
font-size:18px;
border-radius:10px;
border:none;
cursor:pointer;
position:relative;
overflow:hidden;
}

.rosa{background:#ff8ac7;}
.azul{background:#6fb1ce;}
.laranja{background:#ff9800;}

.playing{
background:#00c853 !important;
color:white;
animation:piscar 0.8s infinite;
}

@keyframes piscar{

0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}

}

/* BARRA PROGRESSO */

.progress{
width:0%;
height:6px;
background:#ffffff;
position:absolute;
bottom:0;
left:0;
border-radius:0 0 10px 10px;
}

</style>

</head>

<script>

var audios = {}

window.onload = function(){

var lista = [

"gloriaaleluia1","gloriaaleluia2","cowboy","heee","a5",
"a6","a7","a8","a9","a10",
"trilhacomic","trilhapop1","trilhapop2","trilhapop3","trilhasexy",
"gemido","palmas","assovio","buzina","metralhadora",
"audiobobo","beijo","risada1","risada2","risada3"

]

lista.forEach(function(id){

audios[id] = new Audio(id + ".mp3")

})

}

function play(btn,id){

var audio = audios[id]
var progress = btn.querySelector(".progress")

if(!audio)return

if(!audio.paused){

var fade = setInterval(function(){

if(audio.volume > 0.05){
audio.volume -= 0.05
}else{
clearInterval(fade)
audio.pause()
audio.currentTime = 0
audio.volume = 1
btn.classList.remove("playing")
progress.style.width="0%"
}

},50)

return
}

audio.currentTime = 0
audio.volume = 1

btn.classList.add("playing")

audio.play()

var interval = setInterval(function(){

if(audio.duration){
var percent = (audio.currentTime / audio.duration) * 100
progress.style.width = percent + "%"
}

},100)

audio.onended = function(){

clearInterval(interval)
progress.style.width="0%"
btn.classList.remove("playing")

}

}

/* SISTEMA DE ABAS */

function openTab(id,element){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")
element.classList.add("active")

}

</script>
