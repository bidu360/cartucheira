<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Cartucheira</title>

<style>

body{
background:#000;
font-family:Arial;
margin:0;
color:white;
}

/* TITULO */

.assinatura{
text-align:center;
letter-spacing:2px;
padding:15px;
font-size:20px;
font-weight:bold;
}

/* VU METER */

.vu-container{
width:90%;
height:18px;
margin:0 auto 10px auto;
background:#111;
border-radius:4px;
overflow:hidden;
}

.vu-bar{
height:100%;
width:0%;
background:linear-gradient(to right, #00ff00 0%, #ffff00 70%, #ff0000 100%);
transition:width 0.05s;
}

/* ABAS */

.tabs{
display:flex;
justify-content:space-around;
background:#111;
padding:15px 0;
font-weight:bold;
}

.tab{
cursor:pointer;
}

.tab.active{
color:#00c853;
}

/* PAGINAS */

.page{
display:none;
}

.page.active{
display:block;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
padding:30px;
}

/* BOTÕES */

button{
padding:35px;
font-size:18px;
border-radius:10px;
border:none;
cursor:pointer;
position:relative;
overflow:hidden;
}

.rosa{background:#ff8ac7;}
.azul{background:#6fb1ce;}
.laranja{background:#ff9800;}

.playing{
background:#00c853 !important;
color:white;
animation:piscar 0.8s infinite;
}

@keyframes piscar{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

/* PROGRESSO */

.progress{
width:0%;
height:6px;
background:white;
position:absolute;
bottom:0;
left:0;
}

/* HOME */

.home{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding-top:60px;
}

.logo{
width:420px;
max-width:80%;
margin-bottom:40px;
}

.footer{
color:#aaa;
font-size:14px;
margin-top:40px;
line-height:24px;
}

</style>

</head>

<script>

var audios = {}
var vu = document.getElementById("vu")

window.onload = function(){

var lista = [

"gloriaaleluia1","gloriaaleluia2","cowboy","heee","a5",
"a6","a7","a8","a9","a10",
"trilhacomic","trilhapop1","trilhapop2","trilhapop3","trilhasexy",
"gemido","palmas","assovio","buzina","metralhadora",
"audiobobo","beijo","risada1","risada2","risada3"

]

lista.forEach(function(id){

audios[id] = new Audio(id + ".mp3")

})

}

function play(btn,id){

var audio = audios[id]
var progress = btn.querySelector(".progress")

if(!audio)return

if(!audio.paused){

var fade = setInterval(function(){

if(audio.volume > 0.05){
audio.volume -= 0.05
}else{
clearInterval(fade)
audio.pause()
audio.currentTime = 0
audio.volume = 1
btn.classList.remove("playing")
progress.style.width="0%"
vu.style.width="0%"
}

},50)

return
}

audio.currentTime = 0
audio.volume = 1

btn.classList.add("playing")

audio.play()

var interval = setInterval(function(){

if(audio.duration){

var percent = (audio.currentTime / audio.duration) * 100
progress.style.width = percent + "%"

var vuLevel = Math.random() * 100
vu.style.width = vuLevel + "%"

}

},100)

audio.onended = function(){

clearInterval(interval)
progress.style.width="0%"
vu.style.width="0%"
btn.classList.remove("playing")

}

}

function openTab(id,element){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")
element.classList.add("active")

}

</script>
