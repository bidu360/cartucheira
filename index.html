```html
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Cartucheira</title>

<style>

body{
background:#0a0a0a;
font-family:Arial;
margin:0;
color:white;
}

/* TOPO */

.topo{
text-align:center;
font-weight:bold;
letter-spacing:2px;
padding:15px;
font-size:20px;
}

/* ABAS */

.tabs{
display:flex;
}

.tab{
flex:1;
padding:15px;
text-align:center;
cursor:pointer;
background:#111;
color:white;
font-weight:bold;
border:none;
}

.tab.efeitos.active{background:#ff4fa3;}
.tab.trilhas.active{background:#6fb1ce;color:black;}
.tab.vinil.active{background:#ff9800;color:black;}

/* telas */

.tela{display:none;}
.tela.active{display:block;}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
padding:30px;
}

/* BOTÕES */

button{
padding:35px;
font-size:16px;
border-radius:10px;
border:none;
cursor:pointer;
position:relative;
overflow:hidden;
}

.rosa{background:#ff4fa3;color:white;}
.azulclaro{background:#6fb1ce;color:black;}
.laranja{background:#ff9800;}
.cinza{background:#555;color:white;}

.playing{
background:#00c853 !important;
color:white;
animation:piscar 0.8s infinite;
}

@keyframes piscar{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

/* barra progresso */

.progress{
width:0%;
height:6px;
background:#ffffff;
position:absolute;
bottom:0;
left:0;
}

/* VU METER */

.vumeter{
width:100%;
padding:10px 30px 30px 30px;
display:none;
}

.vu-line{
width:100%;
height:14px;
background:#111;
border-radius:6px;
overflow:hidden;
margin-top:6px;
}

.vu-bar{
height:100%;
width:10%;
background:linear-gradient(
90deg,
#00ff00 0%,
#00ff00 60%,
#ffff00 80%,
#ff0000 100%
);
animation:vuAnim 0.25s infinite alternate;
}

@keyframes vuAnim{
0%{width:10%}
20%{width:35%}
40%{width:60%}
60%{width:40%}
80%{width:80%}
100%{width:30%}
}

/* INICIO */

.inicio{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:70vh;
text-align:center;
}

.logo{
max-width:600px;
width:90%;
margin-bottom:20px;
}

.creditos{
font-size:15px;
opacity:0.85;
max-width:600px;
line-height:1.5;
}

</style>

</head>

<body>

<div class="topo">
CARTUCHEIRA • BY MOZA
</div>

<div class="tabs">
<button class="tab active" onclick="trocarTela('inicio',this)">INÍCIO</button>
<button class="tab efeitos" onclick="trocarTela('efeitos',this)">EFEITOS</button>
<button class="tab trilhas" onclick="trocarTela('trilhas',this)">TRILHAS</button>
<button class="tab vinil" onclick="trocarTela('vinil',this)">DISCO DE VINIL</button>
</div>

<!-- INICIO -->

<div id="inicio" class="tela active">
<div class="inicio">
<img src="logo.png" class="logo">
<div class="creditos">
Cartucheira desenvolvida por Moza para uso próprio em produção e operação de áudio.<br>
© 2026 • Todos os direitos reservados.
</div>
</div>
</div>

<!-- EFEITOS -->

<div id="efeitos" class="tela">

<div class="grid">

<button class="rosa" onclick="play(this,'gloriaaleluia1')">GLORIA ALELUIA 1<div class="progress"></div></button>
<button class="rosa" onclick="play(this,'gloriaaleluia2')">GLORIA ALELUIA 2<div class="progress"></div></button>
<button class="rosa" onclick="play(this,'cowboy')">COWBOY<div class="progress"></div></button>
<button class="rosa" onclick="play(this,'heee')">HEEE<div class="progress"></div></button>
<button class="rosa" onclick="play(this,'gemido')">GEMIDO<div class="progress"></div></button>

<button class="rosa" onclick="play(this,'palmas')">PALMAS<div class="progress"></div></button>
<button class="rosa" onclick="play(this,'assovio')">ASSOVIO<div class="progress"></div></button>
<button class="rosa" onclick="play(this,'buzina')">BUZINA<div class="progress"></div></button>
<button class="rosa" onclick="play(this,'metralhadora')">METRALHADORA<div class="progress"></div></button>
<button class="rosa" onclick="play(this,'audiobobo')">AUDIOBOBO<div class="progress"></div></button>

</div>

<div id="vu" class="vumeter">
<div class="vu-line"><div class="vu-bar"></div></div>
<div class="vu-line"><div class="vu-bar"></div></div>
</div>

</div>

<!-- TRILHAS -->

<div id="trilhas" class="tela">

<div class="grid">

<button class="azulclaro" onclick="play(this,'trilhacomic')">TRILHA COMIC<div class="progress"></div></button>
<button class="azulclaro" onclick="play(this,'trilhapop1')">TRILHA POP 1<div class="progress"></div></button>
<button class="azulclaro" onclick="play(this,'trilhapop2')">TRILHA POP 2<div class="progress"></div></button>
<button class="azulclaro" onclick="play(this,'trilhapop3')">TRILHA POP 3<div class="progress"></div></button>
<button class="azulclaro" onclick="play(this,'trilhasexy')">TRILHA SEXY<div class="progress"></div></button>

</div>

<div class="vumeter">
<div class="vu-line"><div class="vu-bar"></div></div>
<div class="vu-line"><div class="vu-bar"></div></div>
</div>

</div>

<!-- VINIL -->

<div id="vinil" class="tela">

<div class="grid">

<button class="laranja">VINIL 1</button>
<button class="laranja">VINIL 2</button>
<button class="laranja">VINIL 3</button>
<button class="laranja">VINIL 4</button>
<button class="laranja">VINIL 5</button>

</div>

<div class="vumeter">
<div class="vu-line"><div class="vu-bar"></div></div>
<div class="vu-line"><div class="vu-bar"></div></div>
</div>

</div>

<script>

function trocarTela(id,el){

document.querySelectorAll(".tela").forEach(t=>{
t.classList.remove("active")
})

document.getElementById(id).classList.add("active")

document.querySelectorAll(".tab").forEach(t=>{
t.classList.remove("active")
})

el.classList.add("active")

}

var audios={}

window.onload=function(){

var lista=[
"gloriaaleluia1","gloriaaleluia2","cowboy","heee",
"gemido","palmas","assovio","buzina","metralhadora",
"audiobobo",
"trilhacomic","trilhapop1","trilhapop2","trilhapop3","trilhasexy"
]

lista.forEach(function(id){
audios[id]=new Audio(id+".mp3")
})

}

function ligarVU(){
document.querySelectorAll(".vumeter").forEach(v=>{
v.style.display="block"
})
}

function desligarVU(){
document.querySelectorAll(".vumeter").forEach(v=>{
v.style.display="none"
})
}

function play(btn,id){

var audio=audios[id]
var progress=btn.querySelector(".progress")

if(!audio)return

if(!audio.paused){

audio.pause()
audio.currentTime=0
btn.classList.remove("playing")
progress.style.width="0%"
desligarVU()
return

}

audio.currentTime=0
btn.classList.add("playing")
audio.play()
ligarVU()

var interval=setInterval(function(){

if(audio.duration){
var percent=(audio.currentTime/audio.duration)*100
progress.style.width=percent+"%"
}

},100)

audio.onended=function(){

clearInterval(interval)
progress.style.width="0%"
btn.classList.remove("playing")
desligarVU()

}

}

</script>

</body>
</html>
