<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Cartucheira</title>

<style>

body{
background:#0a0a0a;
font-family:Arial;
margin:0;
}

.assinatura{
text-align:center;
color:white;
font-weight:bold;
letter-spacing:2px;
padding:15px;
font-size:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
padding:30px;
}

button{
padding:35px;
font-size:18px;
border-radius:10px;
border:none;
cursor:pointer;
position:relative;
overflow:hidden;
}

.laranja{background:#ff9800;}
.cinza{background:#555;color:white;}
.azul{background:#6fb1ce;}
.amarelo{background:#ffd400;}

.playing{
background:#00c853 !important;
color:white;
animation:piscar 0.8s infinite;
}

/* animação do piscar */

@keyframes piscar{

0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}

}

/* barra de progresso */

.progress{
width:0%;
height:6px;
background:#ffffff;
position:absolute;
bottom:0;
left:0;
border-radius:0 0 10px 10px;
}

</style>

</head>

<body>

<h2 class="assinatura">CARTUCHEIRA • BY MOZA</h2>

<div class="grid">

<!-- LINHA 1 -->
<button class="laranja" onclick="play(this,'gloriaaleluia1')">GLORIA ALELUIA 1<div class="progress"></div></button>
<button class="laranja" onclick="play(this,'gloriaaleluia2')">GLORIA ALELUIA 2<div class="progress"></div></button>
<button class="laranja" onclick="play(this,'cowboy')">COWBOY<div class="progress"></div></button>
<button class="laranja" onclick="play(this,'a4')">Som 4<div class="progress"></div></button>
<button class="laranja" onclick="play(this,'a5')">Som 5<div class="progress"></div></button>

<!-- LINHA 2 -->
<button class="cinza" onclick="play(this,'a6')">Som 6<div class="progress"></div></button>
<button class="cinza" onclick="play(this,'a7')">Som 7<div class="progress"></div></button>
<button class="cinza" onclick="play(this,'a8')">Som 8<div class="progress"></div></button>
<button class="cinza" onclick="play(this,'a9')">Som 9<div class="progress"></div></button>
<button class="cinza" onclick="play(this,'a10')">Som 10<div class="progress"></div></button>

<!-- LINHA 3 -->
<button class="azul" onclick="play(this,'trilhacomic')">TRILHA COMIC<div class="progress"></div></button>
<button class="azul" onclick="play(this,'trilhapop1')">TRILHA POP 1<div class="progress"></div></button>
<button class="azul" onclick="play(this,'trilhapop2')">TRILHA POP 2<div class="progress"></div></button>
<button class="azul" onclick="play(this,'trilhapop3')">TRILHA POP 3<div class="progress"></div></button>
<button class="azul" onclick="play(this,'a15')">Som 15<div class="progress"></div></button>

<!-- LINHA 4 -->
<button class="cinza" onclick="play(this,'gemido')">GEMIDO<div class="progress"></div></button>
<button class="cinza" onclick="play(this,'palmas')">PALMAS<div class="progress"></div></button>
<button class="cinza" onclick="play(this,'assovio')">ASSOVIO<div class="progress"></div></button>
<button class="cinza" onclick="play(this,'buzina')">BUZINA<div class="progress"></div></button>
<button class="cinza" onclick="play(this,'metralhadora')">METRALHADORA<div class="progress"></div></button>

<!-- LINHA 5 -->
<button class="amarelo" onclick="play(this,'audiobobo')">AUDIOBOBO<div class="progress"></div></button>
<button class="amarelo" onclick="play(this,'beijo')">BEIJO<div class="progress"></div></button>
<button class="amarelo" onclick="play(this,'risada1')">RISADA1<div class="progress"></div></button>
<button class="amarelo" onclick="play(this,'risada2')">RISADA2<div class="progress"></div></button>
<button class="amarelo" onclick="play(this,'risada3')">RISADA3<div class="progress"></div></button>

</div>

<script>

var audios = {}

window.onload = function(){

var lista = [

"gloriaaleluia1","gloriaaleluia2","cowboy","a4","a5",
"a6","a7","a8","a9","a10",
"trilhacomic","trilhapop1","trilhapop2","trilhapop3","a15",
"gemido","palmas","assovio","buzina","metralhadora",
"audiobobo","beijo",
"risada1","risada2","risada3"

]

lista.forEach(function(id){

audios[id] = new Audio(id + ".mp3")

})

}

function play(btn,id){

var audio = audios[id]
var progress = btn.querySelector(".progress")

if(!audio){
console.log("Áudio não encontrado:",id)
return
}

if(!audio.paused){

var fade = setInterval(function(){

if(audio.volume > 0.05){
audio.volume -= 0.05
}else{
clearInterval(fade)
audio.pause()
audio.currentTime = 0
audio.volume = 1
btn.classList.remove("playing")
progress.style.width="0%"
}

},50)

return
}

audio.currentTime = 0
audio.volume = 1

btn.classList.add("playing")

audio.play()

var interval = setInterval(function(){

if(audio.duration){
var percent = (audio.currentTime / audio.duration) * 100
progress.style.width = percent + "%"
}

},100)

audio.onended = function(){

clearInterval(interval)
progress.style.width="0%"
btn.classList.remove("playing")

}

}

</script>

</body>
</html>
